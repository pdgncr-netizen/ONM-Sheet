<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint Auto-Resolver · charger-dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg:#0F1719;
    --panel:#161F22;
    --panel-2:#1C2629;
    --line:#26343A;
    --text:#DCE6E8;
    --muted:#7C9098;
    --amber:#F2A93B;
    --green:#3ECF8E;
    --blue:#4FA3E3;
    --red:#E2645A;
    --gray:#3A484D;
    --display: 'Space Grotesk', 'Segoe UI', sans-serif;
    --body: 'Inter', 'Segoe UI', sans-serif;
    --mono: 'IBM Plex Mono', 'Consolas', monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:var(--body); min-height:100vh; }
  .wrap{max-width:980px; margin:0 auto; padding:48px 24px 80px;}

  .eyebrow{
    font-family:var(--mono); font-size:12px; letter-spacing:.14em; color:var(--amber);
    text-transform:uppercase; margin:0 0 10px; display:flex; align-items:center; gap:10px;
  }
  .eyebrow::before{content:""; width:8px; height:8px; border-radius:50%; background:var(--amber); box-shadow:0 0 8px var(--amber);}
  h1{ font-family:var(--display); font-weight:700; font-size:clamp(28px,4vw,40px); margin:0 0 8px; letter-spacing:-0.01em; }
  .sub{color:var(--muted); font-size:15px; max-width:620px; line-height:1.5; margin:0 0 36px;}

  .section-title{
    font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); margin:0 0 12px; display:flex; align-items:center; gap:8px;
  }
  .section-title .n{
    width:20px; height:20px; border-radius:5px; background:var(--panel-2); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; color:var(--amber); font-size:11px;
  }

  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:20px 22px; margin-bottom:22px; }

  /* Master tracker drop zone */
  .drop{
    background:var(--panel-2); border:1px dashed var(--line); border-radius:10px;
    padding:20px; cursor:pointer; transition:.15s all; position:relative;
  }
  .drop:hover, .drop.drag{border-color:var(--amber);}
  .drop.filled{border-style:solid; border-color:var(--green);}
  .drop-name{font-size:14px; font-weight:500; word-break:break-all;}
  .drop-hint{font-size:13px; color:var(--muted); margin-top:4px;}
  .drop input{display:none;}
  .check{
    position:absolute; top:16px; right:16px; width:20px; height:20px; border-radius:50%;
    background:var(--green); display:none; align-items:center; justify-content:center; font-size:12px; color:#06231A;
  }
  .drop.filled .check{display:flex;}

  /* CMS live link */
  .link-row{display:flex; gap:10px; flex-wrap:wrap;}
  input[type=text]{
    flex:1; min-width:240px; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    font-family:var(--mono); font-size:12.5px; padding:12px 14px; border-radius:8px;
  }
  input[type=text]:focus{outline:none; border-color:var(--amber);}
  button.fetch{
    font-family:var(--mono); font-size:12px; letter-spacing:.05em; text-transform:uppercase;
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:12px 18px; border-radius:8px; cursor:pointer; white-space:nowrap;
  }
  button.fetch:hover{border-color:var(--blue); color:var(--blue);}
  .live-status{font-family:var(--mono); font-size:12px; color:var(--muted); margin-top:10px; display:flex; align-items:center; gap:8px;}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--gray); flex:none;}
  .dot.ok{background:var(--green); box-shadow:0 0 6px rgba(62,207,142,.6);}
  .dot.err{background:var(--red);}
  .autorefresh{display:flex; align-items:center; gap:8px; margin-top:14px; font-family:var(--mono); font-size:12px; color:var(--muted);}
  .autorefresh input{accent-color:var(--amber);}

  .run-row{display:flex; align-items:center; gap:16px; margin:8px 0 8px;}
  button.run{
    font-family:var(--mono); font-weight:500; font-size:13px; letter-spacing:.06em; text-transform:uppercase;
    background:var(--amber); color:#231600; border:none; padding:14px 26px; border-radius:8px;
    cursor:pointer; transition:.15s transform,.15s background;
  }
  button.run:disabled{background:var(--gray); color:var(--muted); cursor:not-allowed;}
  button.run:not(:disabled):hover{transform:translateY(-1px); background:#FFC066;}
  .run-status{font-family:var(--mono); font-size:12px; color:var(--muted);}

  .rail-wrap{ margin:36px 0 0; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:20px 22px; }
  .rail-title{font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:14px;}
  .rail{display:flex; flex-wrap:wrap; gap:5px; min-height:16px;}
  .led{width:14px; height:14px; border-radius:3px; background:var(--gray); transition:.25s all; flex:none;}
  .led.open{background:var(--amber); box-shadow:0 0 6px rgba(242,169,59,.5);}
  .led.resolved{background:var(--green); box-shadow:0 0 8px rgba(62,207,142,.65); animation:pop .4s ease;}
  .led.new{background:var(--red); box-shadow:0 0 6px rgba(226,100,90,.5); animation:pop .4s ease;}
  .led.done{background:var(--gray);}
  @keyframes pop{0%{transform:scale(0.3);}70%{transform:scale(1.25);}100%{transform:scale(1);}}

  .legend{display:flex; gap:18px; margin-top:14px; flex-wrap:wrap;}
  .legend span{font-family:var(--mono); font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px;}
  .legend i{width:10px; height:10px; border-radius:2px; display:inline-block;}

  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:20px 0 0;}
  .stat{background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:16px;}
  .stat .num{font-family:var(--display); font-size:28px; font-weight:700;}
  .stat.resolved .num{color:var(--green);}
  .stat.new .num{color:var(--red);}
  .stat.open .num{color:var(--amber);}
  .stat .lbl{font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-top:4px;}

  .actions{display:flex; gap:12px; margin-top:22px; flex-wrap:wrap;}
  .btn-ghost{
    font-family:var(--mono); font-size:12px; letter-spacing:.05em; text-transform:uppercase;
    background:transparent; border:1px solid var(--line); color:var(--text);
    padding:11px 18px; border-radius:8px; cursor:pointer; text-decoration:none; display:inline-block;
  }
  .btn-ghost:hover{border-color:var(--green); color:var(--green);}
  .btn-ghost[disabled]{opacity:.4; pointer-events:none;}

  table{width:100%; border-collapse:collapse; margin-top:20px; font-size:13px;}
  th,td{text-align:left; padding:9px 10px; border-bottom:1px solid var(--line);}
  th{font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:500;}
  td{font-family:var(--mono);}
  tr:last-child td{border-bottom:none;}
  .tag{font-family:var(--mono); font-size:10px; padding:2px 7px; border-radius:20px; text-transform:uppercase;}
  .tag.resolved{background:rgba(62,207,142,.15); color:var(--green);}
  .tag.new{background:rgba(226,100,90,.15); color:var(--red);}

  .log-wrap{margin-top:10px; max-height:280px; overflow:auto; border-radius:8px;}
  .error-box{
    background:#2A1416; border:1px solid #5A2A2E; color:#F2A0A6; border-radius:8px;
    padding:14px 16px; font-family:var(--mono); font-size:12.5px; margin-top:20px; white-space:pre-wrap;
  }
  footer{margin-top:56px; color:var(--muted); font-size:12px; font-family:var(--mono);}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">charger-dashboard · complaint ops</p>
  <h1>Complaint Auto-Resolver</h1>
  <p class="sub">Pulls live charger status straight from your CMS Google Sheet. Any charger with Availability = Error or Disconnected is treated as an open complaint. When it goes healthy again, it's auto-resolved in your tracker.</p>

  <div class="panel">
    <p class="section-title"><span class="n">01</span> Master Tracker</p>
    <label class="drop" id="dropMaster">
      <span class="check">✓</span>
      <span class="drop-name" id="nameMaster">Click or drop .xlsx / .csv</span>
      <span class="drop-hint">Your existing complaint tracker (Charger ID, Error, Report/Resolve Date &amp; Time, Remarks)</span>
      <input type="file" id="fileMaster" accept=".xlsx,.xls,.csv">
    </label>
  </div>

  <div class="panel">
    <p class="section-title"><span class="n">02</span> Live CMS Status (Google Sheet)</p>
    <div class="link-row">
      <input type="text" id="sheetUrl" value="https://docs.google.com/spreadsheets/d/e/2PACX-1vSoaplwjClXYgcnFGz6P40Y7FvXC2x-vyakyo2oq-BnOJT0RID9Hs3QA9GsSGja5tzbzew7XjV6Xduu/pub?gid=1459334809&single=true&output=csv">
      <button class="fetch" id="fetchBtn">Fetch Now</button>
    </div>
    <div class="live-status">
      <span class="dot" id="liveDot"></span>
      <span id="liveText">Not fetched yet</span>
    </div>
    <label class="autorefresh">
      <input type="checkbox" id="autoRefresh"> Auto-refresh every 60s
    </label>
  </div>

  <div class="run-row">
    <button class="run" id="runBtn" disabled>Run Automation</button>
    <span class="run-status" id="runStatus"></span>
  </div>

  <div id="results" style="display:none;">
    <div class="rail-wrap">
      <div class="rail-title">Status rail — one LED per tracker row</div>
      <div class="rail" id="rail"></div>
      <div class="legend">
        <span><i style="background:var(--amber)"></i>still open</span>
        <span><i style="background:var(--green)"></i>auto-resolved just now</span>
        <span><i style="background:var(--red)"></i>new complaint</span>
        <span><i style="background:var(--gray)"></i>already closed</span>
      </div>
    </div>

    <div class="stats">
      <div class="stat resolved"><div class="num" id="statResolved">0</div><div class="lbl">Auto-resolved</div></div>
      <div class="stat new"><div class="num" id="statNew">0</div><div class="lbl">New complaints</div></div>
      <div class="stat open"><div class="num" id="statOpen">0</div><div class="lbl">Still open</div></div>
    </div>

    <div class="actions">
      <a class="btn-ghost" id="downloadBtn" href="#">Download updated tracker (.xlsx)</a>
      <button class="btn-ghost" id="detailsBtn">Show change log</button>
    </div>

    <div class="log-wrap" id="logWrap" style="display:none;">
      <table id="logTable">
        <thead><tr><th>Charger ID</th><th>Action</th><th>Detail</th></tr></thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </div>

  <div class="error-box" id="errorBox" style="display:none;"></div>

  <footer>Master tracker stays on your machine. Live status is pulled directly from your published Google Sheet in your browser.</footer>
</div>

<script>
const MASTER_ALIASES = {
  charger_id: ["charger id","chargerid","charger code","charger no","charger number"],
  error: ["error","charger error","error type","fault","error code"],
  report_dt: ["report date time","complaint report date time","report time","report date","reported on"],
  resolve_dt: ["resolve date time","complaint resolve date time","resolved on","resolve time","resolved date"],
  remarks: ["remarks","remark","comments","notes"],
  status: ["status","complaint status"]
};
const LIVE_ALIASES = {
  charger_id: ["charger code","charger id","chargerid"],
  availability: ["charger availability","availability"],
  connectivity: ["connectivity status"],
  connector: ["connector status"],
  station: ["charging station name","station name"],
  city: ["city name","city"],
  heartbeat: ["last heartbeat"]
};
const HEALTHY_AVAILABILITY = ["available","occupied"];
const HEALTHY_STATUS = ["active"];

function norm(s){ return String(s??"").trim().toLowerCase().replace(/[^a-z0-9]+/g," ").trim(); }

function detectColumns(headers, aliasSet, required){
  const normMap = {};
  headers.forEach(h => normMap[norm(h)] = h);
  const mapping = {};
  for(const key in aliasSet){
    let found = null;
    for(const alias of aliasSet[key]){ if(normMap[alias]){ found = normMap[alias]; break; } }
    if(!found){
      for(const nc in normMap){
        if(aliasSet[key].some(a => nc.includes(a))){ found = normMap[nc]; break; }
      }
    }
    if(found) mapping[key] = found;
  }
  const missing = required.filter(k => !mapping[k]);
  if(missing.length){
    throw new Error(`Could not find column(s) for: ${missing.join(", ")}. Available columns: ${headers.join(", ")}`);
  }
  return mapping;
}

function normKey(v){ if(v===undefined||v===null||v==="") return ""; return String(v).trim().toLowerCase().replace(/\s+/g," "); }
function isBlank(v){ return v===undefined||v===null||String(v).trim()===""; }

function fmtNow(){
  const d = new Date();
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  let h = d.getHours(); const ampm = h>=12?"PM":"AM"; h = h%12; if(h===0) h=12;
  const mm = String(d.getMinutes()).padStart(2,"0");
  return `${String(d.getDate()).padStart(2,"0")}-${months[d.getMonth()]}-${d.getFullYear()} ${String(h).padStart(2,"0")}:${mm} ${ampm}`;
}

function readWorkbookFile(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try{
        const wb = XLSX.read(e.target.result, {type:"binary"});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, {defval:""});
        resolve(rows);
      }catch(err){ reject(err); }
    };
    reader.onerror = reject;
    reader.readAsBinaryString(file);
  });
}

function toCsvExportUrl(url){
  // If it's a normal (non-pub) Google Sheets edit link, convert it to a CSV export link.
  const m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if(url.includes("output=csv")) return url;
  if(m){
    const gidMatch = url.match(/gid=([0-9]+)/);
    const gid = gidMatch ? gidMatch[1] : "0";
    return `https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv&gid=${gid}`;
  }
  return url;
}

function fetchLiveSheet(url){
  return new Promise((resolve, reject) => {
    fetch(toCsvExportUrl(url), {cache:"no-store"})
      .then(res => { if(!res.ok) throw new Error("HTTP "+res.status); return res.text(); })
      .then(text => {
        const parsed = Papa.parse(text, {header:true, skipEmptyLines:true});
        resolve(parsed.data);
      })
      .catch(reject);
  });
}

// ---- State ----
let masterFile = null;
let liveRows = null;

const dropMaster = document.getElementById("dropMaster");
const fileMaster = document.getElementById("fileMaster");
const nameMaster = document.getElementById("nameMaster");
fileMaster.addEventListener("change", () => { if(fileMaster.files[0]) handleMaster(fileMaster.files[0]); });
["dragenter","dragover"].forEach(ev => dropMaster.addEventListener(ev, e=>{e.preventDefault(); dropMaster.classList.add("drag");}));
["dragleave","drop"].forEach(ev => dropMaster.addEventListener(ev, e=>{e.preventDefault(); dropMaster.classList.remove("drag");}));
dropMaster.addEventListener("drop", e => { if(e.dataTransfer.files[0]) handleMaster(e.dataTransfer.files[0]); });
function handleMaster(file){
  masterFile = file;
  nameMaster.textContent = file.name;
  dropMaster.classList.add("filled");
  checkReady();
}

const liveDot = document.getElementById("liveDot");
const liveText = document.getElementById("liveText");
const fetchBtn = document.getElementById("fetchBtn");

async function doFetchLive(){
  const url = document.getElementById("sheetUrl").value.trim();
  if(!url){ return; }
  liveDot.className = "dot";
  liveText.textContent = "Fetching…";
  try{
    const rows = await fetchLiveSheet(url);
    if(!rows.length) throw new Error("Sheet returned no rows.");
    liveRows = rows;
    liveDot.className = "dot ok";
    liveText.textContent = `Loaded ${rows.length} charger rows at ${fmtNow()}`;
  }catch(err){
    liveRows = null;
    liveDot.className = "dot err";
    liveText.textContent = "Fetch failed — " + err.message + " (if this is a CORS error, download the sheet as CSV and check it's published correctly)";
  }
  checkReady();
}
fetchBtn.addEventListener("click", doFetchLive);

let refreshTimer = null;
document.getElementById("autoRefresh").addEventListener("change", e => {
  if(e.target.checked){
    refreshTimer = setInterval(doFetchLive, 60000);
  } else if(refreshTimer){
    clearInterval(refreshTimer);
  }
});

function checkReady(){ document.getElementById("runBtn").disabled = !(masterFile && liveRows); }

document.getElementById("runBtn").addEventListener("click", async () => {
  const errorBox = document.getElementById("errorBox");
  const runStatus = document.getElementById("runStatus");
  errorBox.style.display = "none";
  document.getElementById("results").style.display = "none";
  runStatus.textContent = "Processing…";
  try{
    const masterRows = await readWorkbookFile(masterFile);
    if(!masterRows.length) throw new Error("Master tracker has no rows.");
    if(!liveRows.length) throw new Error("Live sheet has no rows.");

    const masterHeaders = Object.keys(masterRows[0]);
    const liveHeaders = Object.keys(liveRows[0]);
    const mCols = detectColumns(masterHeaders, MASTER_ALIASES, ["charger_id","error","report_dt","resolve_dt","remarks"]);
    const lCols = detectColumns(liveHeaders, LIVE_ALIASES, ["charger_id","availability"]);

    // Build set of currently unhealthy chargers from the live feed
    const unhealthy = new Map(); // charger_id(norm) -> {label, station, city}
    liveRows.forEach(r => {
      const avail = norm(r[lCols.availability]);
      const conn = lCols.connectivity ? norm(r[lCols.connectivity]) : "active";
      const connr = lCols.connector ? norm(r[lCols.connector]) : "active";
      const healthy = HEALTHY_AVAILABILITY.includes(avail) && HEALTHY_STATUS.includes(conn) && HEALTHY_STATUS.includes(connr);
      if(!healthy){
        let label = r[lCols.availability] || "Error";
        if(!HEALTHY_AVAILABILITY.includes(avail) === false){
          // availability itself looked healthy but connectivity/connector isn't
          label = (lCols.connectivity && r[lCols.connectivity]) || (lCols.connector && r[lCols.connector]) || label;
        }
        unhealthy.set(normKey(r[lCols.charger_id]), {
          label, station: lCols.station ? r[lCols.station] : "", city: lCols.city ? r[lCols.city] : ""
        });
      }
    });

    const now = fmtNow();
    const log = [];
    const ledStates = [];
    const openChargerIds = new Set();

    masterRows.forEach(row => {
      const alreadyResolved = !isBlank(row[mCols.resolve_dt]);
      if(alreadyResolved){ ledStates.push("done"); return; }
      const key = normKey(row[mCols.charger_id]);
      openChargerIds.add(key);
      if(!unhealthy.has(key)){
        row[mCols.resolve_dt] = now;
        row[mCols.remarks] = "Auto Resolve";
        if(mCols.status) row[mCols.status] = "Resolved";
        log.push({id: row[mCols.charger_id], action:"resolved", detail:`Back to healthy in live feed — resolved at ${now}`});
        ledStates.push("resolved");
      } else {
        ledStates.push("open");
      }
    });

    let newCount = 0;
    unhealthy.forEach((info, key) => {
      if(!openChargerIds.has(key)){
        const newRow = {};
        masterHeaders.forEach(h => newRow[h] = "");
        // find original (non-normalized) charger id from live rows
        const liveMatch = liveRows.find(r => normKey(r[lCols.charger_id]) === key);
        newRow[mCols.charger_id] = liveMatch ? liveMatch[lCols.charger_id] : key;
        newRow[mCols.error] = info.label;
        newRow[mCols.report_dt] = now;
        if(mCols.status) newRow[mCols.status] = "Open";
        masterRows.push(newRow);
        log.push({id: newRow[mCols.charger_id], action:"new", detail:`${info.label}${info.station ? " — " + info.station : ""}${info.city ? ", " + info.city : ""}`});
        ledStates.push("new");
        newCount++;
      }
    });

    const resolvedCount = log.filter(l=>l.action==="resolved").length;
    const openCount = ledStates.filter(s=>s==="open").length;

    renderRail(ledStates);
    document.getElementById("statResolved").textContent = resolvedCount;
    document.getElementById("statNew").textContent = newCount;
    document.getElementById("statOpen").textContent = openCount;
    renderLog(log);

    const ws = XLSX.utils.json_to_sheet(masterRows, {header: masterHeaders});
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Tracker");
    const wbout = XLSX.write(wb, {bookType:"xlsx", type:"array"});
    const blob = new Blob([wbout], {type:"application/octet-stream"});
    const url = URL.createObjectURL(blob);
    const dl = document.getElementById("downloadBtn");
    dl.href = url;
    dl.download = "updated_complaint_tracker.xlsx";

    document.getElementById("results").style.display = "block";
    runStatus.textContent = `Done at ${now}`;
  }catch(err){
    errorBox.style.display = "block";
    errorBox.textContent = "⚠ " + err.message;
    runStatus.textContent = "Failed";
  }
});

function renderRail(states){
  const rail = document.getElementById("rail");
  rail.innerHTML = "";
  states.forEach(s => { const d = document.createElement("div"); d.className = "led " + s; rail.appendChild(d); });
}
function renderLog(log){
  const body = document.getElementById("logBody");
  body.innerHTML = "";
  log.forEach(l => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${l.id}</td><td><span class="tag ${l.action}">${l.action}</span></td><td>${l.detail}</td>`;
    body.appendChild(tr);
  });
}
document.getElementById("detailsBtn").addEventListener("click", () => {
  const w = document.getElementById("logWrap");
  w.style.display = w.style.display === "none" ? "block" : "none";
});
</script>
</body>
</html>
